version: 1
name: resline.github.io
tagline: Minimalna strona GitHub Pages wyświetlająca dwa kolory w postaci obrazków PNG.
description: >
  resline.github.io to repozytorium typu GitHub Pages (user.github.io) należące do użytkownika resline. Strona jest bardzo prosta — składa się z jednego pliku index.html oraz dwóch małych obrazków gray.png i orange.png. Nie zawiera żadnych skryptów, arkuszy stylów ani treści tekstowej poza nagłówkiem i podpisami.


  Strona index.html nosi tytuł "Colors Display". W sekcji body wyświetla nagłówek drugiego stopnia "Colors:", a następnie dwa akapity z etykietami "Gray:" i "Orange:", pod którymi umieszczone są obrazki 50×50 pikseli odpowiadające kolorom szaremu i pomarańczowemu. Całość działa jako statyczna strona HTML serwowana przez GitHub Pages pod adresem https://resline.github.io.


  Projekt ma charakter demonstracyjny lub testowy — nie pełni żadnej zaawansowanej funkcji. Może służyć jako weryfikacja działania GitHub Pages dla konta resline lub jako minimalny szablon do dalszych eksperymentów z publikacją statycznych stron.
features:
